kind = "mobile"
previewPath = "/"
title = "NexPage"
version = "1.0.0"
id = "artifacts/nexpage"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20664

[services.development]
run = "pnpm --filter @workspace/nexpage run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexpage", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/nexpage", "run", "serve" ]

[services.env]
PORT = "20664"
BASE_PATH = "/"
